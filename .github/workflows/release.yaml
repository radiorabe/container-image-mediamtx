name: Release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  release-container:
    uses: radiorabe/actions/.github/workflows/release-container.yaml@479996126a091287dc3fd349786f6f8a6dd1b23c # v0.42.0
    with:
      image: ghcr.io/radiorabe/mediamtx
      name: mediamtx
      display-name: RaBe MediaMTX
      tags: rhel9 mediamtx rabe
      cosign-verify: false
      platforms: "linux/amd64,linux/arm64"
      docker-daemon-config: |
        {
          "features": {
            "containerd-snapshotter": true
          }
        }
